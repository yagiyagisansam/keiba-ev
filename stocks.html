<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>StockScan JP</title>
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<style>
/* ── リセット ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px}
body{
  font-family:-apple-system,'Hiragino Sans','Yu Gothic','Meiryo',sans-serif;
  background:#ECEFF1;color:#263238;
}

/* ── ナビ ── */
.kb-nav{
  background:#0A3270;
  display:flex;align-items:stretch;
  padding:0 12px;gap:4px;overflow-x:auto;
}
.kb-nav a{
  display:inline-flex;align-items:center;
  padding:9px 16px;font-size:13px;font-weight:bold;
  color:#90CAF9;text-decoration:none;
  border-radius:4px 4px 0 0;transition:background .15s;white-space:nowrap;
}
.kb-nav a:hover{background:rgba(255,255,255,.1);color:#fff}
.kb-nav a.active{background:#0D47A1;color:#fff}

/* ── ヘッダー ── */
.hdr{
  background:#0D47A1;color:#fff;
  padding:10px 14px;
  display:flex;justify-content:space-between;align-items:center;
  gap:8px;flex-wrap:wrap;
}
.hdr-left{display:flex;align-items:center;gap:10px}
.hdr-title{font-size:16px;font-weight:bold}
.hdr-sub{font-size:11px;color:#90CAF9}
.hdr-right{display:flex;gap:8px;align-items:center}

/* ── ボタン共通 ── */
.btn{
  border:none;border-radius:6px;
  padding:0 14px;height:36px;font-size:13px;font-weight:bold;
  cursor:pointer;font-family:inherit;white-space:nowrap;
  display:inline-flex;align-items:center;gap:6px;
  transition:background .15s;
}
.btn-outline{
  background:rgba(255,255,255,.15);color:#fff;
  border:1px solid rgba(255,255,255,.35);
}
.btn-outline:hover{background:rgba(255,255,255,.25)}
.btn-primary{background:#1565C0;color:#fff}
.btn-primary:hover{background:#0D47A1}
.btn-danger{background:#c62828;color:#fff;font-size:12px;padding:0 10px;height:30px}
.btn-danger:hover{background:#b71c1c}
.btn-sm{height:30px;font-size:12px;padding:0 10px}

/* ── メインレイアウト ── */
.main{max-width:960px;margin:0 auto;padding:16px 12px}

/* ── バッジ（マッチ数） ── */
.match-header{
  display:flex;align-items:center;gap:10px;
  margin-bottom:12px;flex-wrap:wrap;
}
.badge-count{
  background:#1565C0;color:#fff;
  border-radius:99px;padding:4px 14px;
  font-size:13px;font-weight:bold;
}
.badge-date{font-size:12px;color:#546E7A}
.badge-none{
  background:#90A4AE;color:#fff;
  border-radius:99px;padding:4px 14px;
  font-size:13px;font-weight:bold;
}

/* ── ストックカード ── */
.stock-card{
  background:#fff;border-radius:10px;
  box-shadow:0 1px 4px rgba(0,0,0,.12);
  margin-bottom:14px;overflow:hidden;
}
.card-header{
  padding:12px 16px;
  display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:6px;cursor:pointer;
  border-bottom:1px solid #E3F2FD;
}
.card-header:hover{background:#F5F9FF}
.card-code{font-size:17px;font-weight:bold;color:#0D47A1}
.card-name{font-size:13px;color:#546E7A;margin-left:6px}
.card-price-wrap{display:flex;align-items:baseline;gap:8px}
.card-price{font-size:17px;font-weight:bold}
.card-change{font-size:13px;font-weight:bold}
.up{color:#c62828}.down{color:#1565C0}.flat{color:#546E7A}

/* ── マッチ手法バッジ ── */
.match-badges{
  display:flex;flex-wrap:wrap;gap:6px;
  padding:10px 16px 6px;
}
.mbadge{
  background:#E3F2FD;color:#0D47A1;
  border-radius:99px;padding:3px 10px;
  font-size:12px;font-weight:bold;
}

/* ── パターン + チャートセクション ── */
.card-body{padding:12px 16px 16px}
.pattern-block{
  background:#F5F9FF;border-radius:8px;
  padding:12px;margin-bottom:12px;
  display:flex;gap:12px;align-items:flex-start;flex-wrap:wrap;
}
.pattern-svg{flex-shrink:0}
.pattern-text h4{font-size:13px;font-weight:bold;color:#0D47A1;margin-bottom:4px}
.pattern-text p{font-size:12px;color:#546E7A;line-height:1.5}

/* ── チャート ── */
.chart-wrap{
  border-radius:8px;overflow:hidden;
  border:1px solid #E3F2FD;
}
.chart-title{
  font-size:11px;color:#546E7A;
  padding:6px 10px;background:#F8FBFF;
  border-bottom:1px solid #E3F2FD;
}
.chart-container{height:260px;width:100%}
.vol-container{height:80px;width:100%}

/* ── 未マッチ銘柄 ── */
.no-match-section{
  background:#fff;border-radius:10px;
  box-shadow:0 1px 4px rgba(0,0,0,.08);
  padding:12px 16px;margin-top:8px;
}
.no-match-title{
  font-size:12px;color:#90A4AE;font-weight:bold;
  margin-bottom:8px;
}
.no-match-list{
  display:flex;flex-wrap:wrap;gap:6px;
}
.no-match-chip{
  background:#ECEFF1;color:#78909C;
  border-radius:6px;padding:4px 10px;
  font-size:12px;
}

/* ── ドロワー（手法選択・銘柄管理） ── */
.overlay{
  display:none;
  position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;
}
.overlay.open{display:block}
.drawer{
  position:fixed;
  background:#fff;z-index:101;
  overflow-y:auto;
  transition:transform .25s ease;
}
/* PC: 左からスライド */
@media(min-width:600px){
  .drawer{
    left:0;top:0;bottom:0;
    width:300px;
    transform:translateX(-100%);
  }
  .drawer.open{transform:translateX(0)}
}
/* スマホ: 下からボトムシート */
@media(max-width:599px){
  .drawer{
    left:0;right:0;bottom:0;
    max-height:80vh;
    border-radius:16px 16px 0 0;
    transform:translateY(100%);
  }
  .drawer.open{transform:translateY(0)}
  /* スワイプインジケーター */
  .drawer::before{
    content:'';display:block;
    width:40px;height:4px;border-radius:2px;
    background:#CFD8DC;margin:10px auto 0;
  }
}
.drawer-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px 10px;
  border-bottom:1px solid #E3F2FD;
  position:sticky;top:0;background:#fff;z-index:1;
}
.drawer-hdr h2{font-size:15px;font-weight:bold;color:#0D47A1}
.close-btn{
  background:none;border:none;cursor:pointer;
  font-size:20px;color:#90A4AE;padding:4px;
  line-height:1;
}
.close-btn:hover{color:#263238}

/* ── 手法チェックリスト ── */
.method-category{margin:0 16px 4px}
.method-category-title{
  font-size:11px;font-weight:bold;color:#90A4AE;
  letter-spacing:.05em;text-transform:uppercase;
  padding:10px 0 4px;border-bottom:1px solid #ECEFF1;
}
.method-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 4px;border-bottom:1px solid #F5F5F5;
  cursor:pointer;
}
.method-item:hover{background:#F5F9FF;margin:0 -4px;padding:9px 8px}
.method-item input[type=checkbox]{
  width:18px;height:18px;cursor:pointer;accent-color:#1565C0;flex-shrink:0;
}
.method-item label{font-size:13px;cursor:pointer;flex:1}
.drawer-footer{
  position:sticky;bottom:0;background:#fff;
  padding:12px 16px;border-top:1px solid #E3F2FD;
}

/* ── 銘柄管理ドロワー ── */
.stock-input-row{
  display:flex;gap:8px;padding:12px 16px;
  border-bottom:1px solid #ECEFF1;
}
.stock-input-row input{
  flex:1;border:1px solid #B0BEC5;border-radius:6px;
  padding:0 10px;height:38px;font-size:14px;font-family:inherit;
}
.stock-input-row input:focus{outline:none;border-color:#1565C0}
.stock-list-wrap{padding:8px 16px}
.stock-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 0;border-bottom:1px solid #ECEFF1;
}
.stock-row-info{display:flex;flex-direction:column}
.stock-row-code{font-size:14px;font-weight:bold;color:#0D47A1}
.stock-row-name{font-size:11px;color:#90A4AE}
.stock-note{
  font-size:11px;color:#90A4AE;
  padding:10px 16px;line-height:1.5;
  background:#F8FBFF;margin:8px 16px;border-radius:6px;
}

/* ── スピナー・状態 ── */
.loading-wrap{text-align:center;padding:40px 20px;color:#90A4AE}
.spinner{
  display:inline-block;width:28px;height:28px;
  border:3px solid #E3F2FD;border-top-color:#1565C0;
  border-radius:50%;animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:48px 20px;color:#90A4AE}
.empty-state .icon{font-size:40px;margin-bottom:10px}

/* ── ユーティリティ ── */
.mt8{margin-top:8px}
.gap8{gap:8px}
</style>
</head>
<body>

<!-- ナビゲーション -->
<nav class="kb-nav">
  <a href="index.html">競馬EV</a>
  <a href="umatan.html">馬単</a>
  <a href="stocks.html" class="active">StockScan JP</a>
</nav>

<!-- ヘッダー -->
<div class="hdr">
  <div class="hdr-left">
    <div>
      <div class="hdr-title">📊 StockScan JP</div>
      <div class="hdr-sub" id="hdrSub">読み込み中...</div>
    </div>
  </div>
  <div class="hdr-right">
    <button class="btn btn-outline" onclick="openDrawer('method')">
      ☰ 手法設定 <span id="methodCount" style="font-size:11px;opacity:.8"></span>
    </button>
    <button class="btn btn-outline" onclick="openDrawer('stock')">
      📋 銘柄管理
    </button>
  </div>
</div>

<!-- メインコンテンツ -->
<div class="main" id="mainContent">
  <div class="loading-wrap">
    <div class="spinner"></div>
    <div style="margin-top:12px;font-size:13px">データ読み込み中...</div>
  </div>
</div>

<!-- ─── 手法設定ドロワー ─── -->
<div class="overlay" id="methodOverlay" onclick="closeDrawer('method')"></div>
<div class="drawer" id="methodDrawer">
  <div class="drawer-hdr">
    <h2>分析手法を選択</h2>
    <button class="close-btn" onclick="closeDrawer('method')">✕</button>
  </div>
  <div id="methodList"></div>
  <div class="drawer-footer">
    <button class="btn btn-primary" style="width:100%" onclick="closeDrawer('method')">
      完了
    </button>
  </div>
</div>

<!-- ─── 銘柄管理ドロワー ─── -->
<div class="overlay" id="stockOverlay" onclick="closeDrawer('stock')"></div>
<div class="drawer" id="stockDrawer">
  <div class="drawer-hdr">
    <h2>銘柄管理</h2>
    <button class="close-btn" onclick="closeDrawer('stock')">✕</button>
  </div>
  <div class="stock-input-row">
    <input type="text" id="stockCodeInput" placeholder="銘柄コード（例: 7203）" maxlength="6"
           oninput="this.value=this.value.replace(/[^0-9]/g,'')"
           onkeydown="if(event.key==='Enter')addStock()">
    <button class="btn btn-primary" onclick="addStock()">追加</button>
  </div>
  <div class="stock-note" id="stockNote">
    ⚠ 銘柄をUIで追加・削除しても、<strong>次回の分析（毎日18:00）</strong>まで結果には反映されません。
    リポジトリの <code>data/stocks.json</code> を直接編集すると即時反映されます。
  </div>
  <div class="stock-list-wrap" id="stockListWrap"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// 定数 & パターン定義
// ═══════════════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════════════
// アプリ状態
// ═══════════════════════════════════════════════════════════════

const ALL_KEYS = CATEGORIES.flatMap(c => c.methods.map(m => m.key));

let state = {
  results:        null,
  stocks:         [],     // ローカル管理の銘柄リスト
  enabledMethods: new Set(ALL_KEYS),  // 全手法を初期選択
  charts:         {},     // chartId → LightweightCharts instance
};

// ═══════════════════════════════════════════════════════════════
// localStorage
// ═══════════════════════════════════════════════════════════════

function loadSettings() {
  try {
    const saved = localStorage.getItem('ssjp_methods');
    if (saved) {
      state.enabledMethods = new Set(JSON.parse(saved));
    }
    const savedStocks = localStorage.getItem('ssjp_stocks');
    if (savedStocks) {
      state.stocks = JSON.parse(savedStocks);
    }
  } catch (e) {}
}

function saveSettings() {
  localStorage.setItem('ssjp_methods', JSON.stringify([...state.enabledMethods]));
  localStorage.setItem('ssjp_stocks', JSON.stringify(state.stocks));
}

// ═══════════════════════════════════════════════════════════════
// データ読み込み
// ═══════════════════════════════════════════════════════════════

async function loadData() {
  try {
    const [resRes, stockRes] = await Promise.all([
      fetch(`data/results.json?t=${Date.now()}`),
      fetch(`data/stocks.json?t=${Date.now()}`),
    ]);
    state.results = await resRes.json();
    const remoteStocks = await stockRes.json();

    // ローカル管理銘柄がなければリモートをベースに
    if (state.stocks.length === 0) {
      state.stocks = remoteStocks;
      saveSettings();
    }
  } catch (e) {
    state.results = { date: '--', total: 0, matched: 0, stocks: [] };
  }
  render();
}

// ═══════════════════════════════════════════════════════════════
// レンダリング
// ═══════════════════════════════════════════════════════════════

function render() {
  // ヘッダー更新
  const sub = document.getElementById('hdrSub');
  if (state.results && state.results.date !== '--') {
    sub.textContent = `最終更新: ${state.results.date}  登録: ${state.stocks.length}/100銘柄`;
  } else {
    sub.textContent = `登録: ${state.stocks.length}/100銘柄  （まだ分析未実行）`;
  }

  // 手法カウント更新
  document.getElementById('methodCount').textContent = `${state.enabledMethods.size}選択中`;

  const main = document.getElementById('mainContent');
  main.innerHTML = '';

  const stocks = (state.results && state.results.stocks) || [];

  // 有効な手法でフィルタリング
  const filtered = stocks.map(s => ({
    ...s,
    matches: s.matches.filter(m => state.enabledMethods.has(m.key)),
  })).filter(s => s.matches.length > 0);

  const unmatched = stocks.filter(s =>
    !s.matches.some(m => state.enabledMethods.has(m.key))
  );

  // マッチ数バッジ
  const mhdr = document.createElement('div');
  mhdr.className = 'match-header';

  if (filtered.length > 0) {
    const badge = document.createElement('span');
    badge.className = 'badge-count';
    badge.textContent = `🔔 マッチ銘柄 ${filtered.length}件`;
    mhdr.appendChild(badge);
  } else {
    const badge = document.createElement('span');
    badge.className = 'badge-none';
    badge.textContent = stocks.length === 0
      ? '分析未実行 — GitHub Actionsを手動実行してください'
      : '本日マッチなし';
    mhdr.appendChild(badge);
  }

  if (state.results && state.results.date !== '--') {
    const dateEl = document.createElement('span');
    dateEl.className = 'badge-date';
    dateEl.textContent = state.results.date + ' 終値時点';
    mhdr.appendChild(dateEl);
  }
  main.appendChild(mhdr);

  // マッチ銘柄カード
  filtered.forEach((s, idx) => {
    main.appendChild(buildCard(s, idx));
  });

  // 未マッチ銘柄
  if (unmatched.length > 0) {
    const sec = document.createElement('div');
    sec.className = 'no-match-section';
    const t = document.createElement('div');
    t.className = 'no-match-title';
    t.textContent = `本日マッチなし（${unmatched.length}銘柄）`;
    sec.appendChild(t);
    const list = document.createElement('div');
    list.className = 'no-match-list';
    unmatched.forEach(s => {
      const chip = document.createElement('span');
      chip.className = 'no-match-chip';
      chip.textContent = `${s.code} ${s.name}`;
      list.appendChild(chip);
    });
    sec.appendChild(list);
    main.appendChild(sec);
  }

  if (stocks.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.innerHTML = `<div class="icon">📊</div>
      <p>分析データがありません。</p>
      <p style="font-size:12px;margin-top:8px;color:#90A4AE">
        GitHubリポジトリの Actions タブから<br>
        「株価テクニカル分析」を手動実行してください。
      </p>`;
    main.appendChild(empty);
  }

  // 手法ドロワーを更新
  buildMethodList();
  buildStockList();
}

// ─── 個別カード ────────────────────────────────────────────────

function buildCard(s, idx) {
  const card = document.createElement('div');
  card.className = 'stock-card';

  const sign = s.change >= 0 ? '+' : '';
  const cls  = s.change > 0 ? 'up' : s.change < 0 ? 'down' : 'flat';
  const arrow = s.change > 0 ? '▲' : s.change < 0 ? '▼' : '─';

  // カードヘッダー
  const hdr = document.createElement('div');
  hdr.className = 'card-header';
  hdr.innerHTML = `
    <div style="display:flex;align-items:center;flex-wrap:wrap;gap:4px">
      <span class="card-code">${s.code}</span>
      <span class="card-name">${s.name || ''}</span>
    </div>
    <div class="card-price-wrap">
      <span class="card-price">¥${s.close.toLocaleString()}</span>
      <span class="card-change ${cls}">${arrow}${sign}${s.change.toFixed(1)}%</span>
    </div>
  `;
  card.appendChild(hdr);

  // マッチ手法バッジ
  const badges = document.createElement('div');
  badges.className = 'match-badges';
  s.matches.forEach(m => {
    const b = document.createElement('span');
    b.className = 'mbadge';
    b.textContent = m.label;
    badges.appendChild(b);
  });
  card.appendChild(badges);

  // カードボディ（パターン解説 + チャート）
  const body = document.createElement('div');
  body.className = 'card-body';

  // 一致した各パターンの解説
  s.matches.forEach(m => {
    const info = PATTERN_INFO[m.key];
    if (!info) return;
    const block = document.createElement('div');
    block.className = 'pattern-block';
    block.innerHTML = `
      <div class="pattern-svg">${info.svg}</div>
      <div class="pattern-text">
        <h4>${m.label}</h4>
        <p>${info.desc}</p>
      </div>
    `;
    body.appendChild(block);
  });

  // チャート
  if (s.chart && s.chart.length > 0) {
    const chartWrap = document.createElement('div');
    chartWrap.className = 'chart-wrap mt8';
    const chartId = `chart-${s.code}-${idx}`;
    chartWrap.innerHTML = `
      <div class="chart-title">日足チャート（直近90日）　─── 5日MA　─── 25日MA　─── 75日MA</div>
      <div class="chart-container" id="${chartId}-price"></div>
      <div class="vol-container" id="${chartId}-vol"></div>
    `;
    body.appendChild(chartWrap);

    // チャート描画は次のフレームで（DOM挿入後）
    setTimeout(() => renderChart(chartId, s.chart), 0);
  }

  card.appendChild(body);
  return card;
}

// ─── Lightweight Charts 描画 ────────────────────────────────

function renderChart(chartId, data) {
  const priceEl = document.getElementById(`${chartId}-price`);
  const volEl   = document.getElementById(`${chartId}-vol`);
  if (!priceEl || !volEl) return;

  const chartOpts = {
    layout: { background: { color: '#fff' }, textColor: '#546E7A' },
    grid: {
      vertLines: { color: '#F5F5F5' },
      horzLines: { color: '#F5F5F5' },
    },
    rightPriceScale: { borderColor: '#E3F2FD' },
    timeScale: { borderColor: '#E3F2FD', timeVisible: true },
    crosshair: { mode: 1 },
    width:  priceEl.offsetWidth || 320,
    height: 260,
  };

  // ── 価格チャート ──
  const priceChart = LightweightCharts.createChart(priceEl, chartOpts);

  const candleSeries = priceChart.addCandlestickSeries({
    upColor:          '#1b5e20',
    downColor:        '#c62828',
    borderUpColor:    '#1b5e20',
    borderDownColor:  '#c62828',
    wickUpColor:      '#1b5e20',
    wickDownColor:    '#c62828',
  });
  candleSeries.setData(data.map(d => ({
    time:  d.time,
    open:  d.open,
    high:  d.high,
    low:   d.low,
    close: d.close,
  })));

  // MA5
  const ma5Series = priceChart.addLineSeries({ color: '#e53935', lineWidth: 1, priceLineVisible: false, lastValueVisible: false });
  ma5Series.setData(data.filter(d => d.ma5 !== null).map(d => ({ time: d.time, value: d.ma5 })));

  // MA25
  const ma25Series = priceChart.addLineSeries({ color: '#fb8c00', lineWidth: 1.5, priceLineVisible: false, lastValueVisible: false });
  ma25Series.setData(data.filter(d => d.ma25 !== null).map(d => ({ time: d.time, value: d.ma25 })));

  // MA75
  const ma75Series = priceChart.addLineSeries({ color: '#1565c0', lineWidth: 2, priceLineVisible: false, lastValueVisible: false });
  ma75Series.setData(data.filter(d => d.ma75 !== null).map(d => ({ time: d.time, value: d.ma75 })));

  priceChart.timeScale().fitContent();

  // ── 出来高チャート ──
  const volChart = LightweightCharts.createChart(volEl, {
    ...chartOpts,
    height: 80,
    rightPriceScale: { ...chartOpts.rightPriceScale, minimumWidth: 60 },
    timeScale: { ...chartOpts.timeScale, visible: false },
  });

  const volSeries = volChart.addHistogramSeries({
    color: '#90CAF9',
    priceScaleId: 'volume',
  });
  volSeries.priceScale().applyOptions({ scaleMargins: { top: 0.1, bottom: 0 } });
  volSeries.setData(data.map(d => ({
    time:  d.time,
    value: d.volume,
    color: d.close >= d.open ? 'rgba(27,94,32,.6)' : 'rgba(198,40,40,.5)',
  })));
  volChart.timeScale().fitContent();

  // チャートをリサイズに追従
  const ro = new ResizeObserver(() => {
    const w = priceEl.offsetWidth;
    if (w > 0) {
      priceChart.applyOptions({ width: w });
      volChart.applyOptions({ width: w });
    }
  });
  ro.observe(priceEl);

  // チャートを同期
  priceChart.timeScale().subscribeVisibleLogicalRangeChange(range => {
    if (range) volChart.timeScale().setVisibleLogicalRange(range);
  });
  volChart.timeScale().subscribeVisibleLogicalRangeChange(range => {
    if (range) priceChart.timeScale().setVisibleLogicalRange(range);
  });
}

// ═══════════════════════════════════════════════════════════════
// 手法ドロワー
// ═══════════════════════════════════════════════════════════════

function buildMethodList() {
  const container = document.getElementById('methodList');
  container.innerHTML = '';

  CATEGORIES.forEach(cat => {
    const catDiv = document.createElement('div');
    catDiv.className = 'method-category';

    const title = document.createElement('div');
    title.className = 'method-category-title';
    title.textContent = cat.label;
    catDiv.appendChild(title);

    cat.methods.forEach(m => {
      const item = document.createElement('div');
      item.className = 'method-item';

      const cb = document.createElement('input');
      cb.type    = 'checkbox';
      cb.id      = `cb-${m.key}`;
      cb.checked = state.enabledMethods.has(m.key);
      cb.addEventListener('change', () => {
        if (cb.checked) state.enabledMethods.add(m.key);
        else            state.enabledMethods.delete(m.key);
        saveSettings();
        document.getElementById('methodCount').textContent = `${state.enabledMethods.size}選択中`;
        render();
      });

      const label = document.createElement('label');
      label.htmlFor   = `cb-${m.key}`;
      label.textContent = m.label;

      item.appendChild(cb);
      item.appendChild(label);
      catDiv.appendChild(item);
    });

    container.appendChild(catDiv);
  });
}

// ═══════════════════════════════════════════════════════════════
// 銘柄管理ドロワー
// ═══════════════════════════════════════════════════════════════

function buildStockList() {
  const wrap = document.getElementById('stockListWrap');
  wrap.innerHTML = '';

  if (state.stocks.length === 0) {
    wrap.innerHTML = '<div style="color:#90A4AE;font-size:13px;padding:10px 0">銘柄が登録されていません</div>';
    return;
  }

  state.stocks.forEach((s, idx) => {
    const row = document.createElement('div');
    row.className = 'stock-row';
    row.innerHTML = `
      <div class="stock-row-info">
        <span class="stock-row-code">${s.code}</span>
        <span class="stock-row-name">${s.name || ''}</span>
      </div>
      <button class="btn btn-danger" onclick="removeStock(${idx})">削除</button>
    `;
    wrap.appendChild(row);
  });
}

async function addStock() {
  const input = document.getElementById('stockCodeInput');
  const code  = input.value.trim();
  if (!code || !/^\d{4}$/.test(code)) {
    alert('4桁の銘柄コードを入力してください');
    return;
  }
  if (state.stocks.some(s => s.code === code)) {
    alert(`${code} は既に登録されています`);
    return;
  }
  if (state.stocks.length >= 100) {
    alert('銘柄は最大100件まで登録できます');
    return;
  }

  // Yahoo Finance から銘柄名取得を試みる（CORS回避のため省略）
  state.stocks.push({ code, name: '' });
  saveSettings();
  buildStockList();
  input.value = '';
}

function removeStock(idx) {
  if (!confirm(`${state.stocks[idx].code} を削除しますか？`)) return;
  state.stocks.splice(idx, 1);
  saveSettings();
  buildStockList();
}

// ═══════════════════════════════════════════════════════════════
// ドロワー開閉
// ═══════════════════════════════════════════════════════════════

function openDrawer(type) {
  document.getElementById(`${type}Overlay`).classList.add('open');
  document.getElementById(`${type}Drawer`).classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeDrawer(type) {
  document.getElementById(`${type}Overlay`).classList.remove('open');
  document.getElementById(`${type}Drawer`).classList.remove('open');
  document.body.style.overflow = '';
}

loadSettings();
loadData();
