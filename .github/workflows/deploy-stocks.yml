name: stocks.html を yagiyagisansam.github.io へ同期

on:
  push:
    branches: [main]
    paths:
      - 'stocks.html'
      - 'data/**'
  workflow_run:
    workflows: ["株価テクニカル分析"]
    types: [completed]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: keiba-ev チェックアウト
        uses: actions/checkout@v4
        with:
          path: keiba-ev

      - name: yagiyagisansam.github.io チェックアウト
        uses: actions/checkout@v4
        with:
          repository: yagiyagisansam/yagiyagisansam.github.io
          token: ${{ secrets.DEPLOY_TOKEN }}
          path: pages

      - name: stocks.html と data/ を同期
        run: |
          cp keiba-ev/stocks.html pages/stocks.html
          mkdir -p pages/data
          cp keiba-ev/data/results.json pages/data/results.json 2>/dev/null || true
          cp keiba-ev/data/stocks.json  pages/data/stocks.json  2>/dev/null || true

      - name: コミット & プッシュ
        run: |
          cd pages
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          git add stocks.html data/
          git diff --staged --quiet || git commit -m "sync: keiba-ev から stocks.html を更新"
          git push
