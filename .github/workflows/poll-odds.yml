# 発走前オッズ収集(late money) ワークフロー
#
# 過去レースの途中オッズは取得できないため、開催日にこれから発走するレースの
# オッズを発走前(60/30/15/10/5/3/1分前)に時系列スナップショット取得して
# odds_snapshots に貯める(前進収集)。ユーザはレース中スマホを使えない前提で、
# 完全自動(cron)で回す。
#
# 毎日 cron を回し、まず「開催日判定」で発走時刻のあるレース数を確認。
# 0(非開催: 平日など)なら即終了(race_list 1回だけの軽い no-op)。
# >0(土日・祝日開催)なら DB を取得してポーリングし、Release に追記。
# → 土日だけでなく祝日月曜などの開催も取りこぼさず、電話操作は一切不要。
#
# 1ジョブ最長6時間のため、午前(JST 09:00)と午後(JST 13:00)の2本で当日をカバー。
name: 発走前オッズ収集(late money)

on:
  workflow_dispatch:
    inputs:
      date:
        description: '対象開催日 YYYYMMDD (空なら当日JST)'
        default: ''
      max_minutes:
        description: '時間予算(分)'
        default: '330'
      offsets:
        description: '発走前ポーリング分(カンマ区切り)'
        default: '60,30,15,10,5,3,1'
  schedule:
    - cron: '0 0 * * *'    # 毎日 JST 09:00 開始(午前〜。非開催日は即終了)
    - cron: '0 4 * * *'    # 毎日 JST 13:00 開始(午後の遅いレース補完)

permissions:
  contents: write

concurrency:
  group: poll-odds-${{ github.event.schedule || inputs.date || 'manual' }}
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 355
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 依存関係インストール
        run: pip install -r requirements.txt

      - name: 開催日判定(発走時刻のあるレース数)
        id: check
        env:
          IN_DATE: ${{ inputs.date }}
          PROXY_URL: ${{ secrets.PROXY_URL }}
        run: |
          DATE="${IN_DATE:-$(TZ=Asia/Tokyo date +%Y%m%d)}"
          echo "date=$DATE" >> "$GITHUB_OUTPUT"
          N=$(python -m scraper.poll_odds --db /tmp/nop.db --date "$DATE" \
                --count-only 2>/dev/null | sed -n 's/^RACES=//p')
          N="${N:-0}"
          echo "races=$N" >> "$GITHUB_OUTPUT"
          echo "対象日 $DATE: $N レース$([ "$N" = 0 ] && echo ' → 非開催、スキップ')"

      - name: 発走前オッズを時系列収集(開催日のみ)
        if: steps.check.outputs.races != '0'
        env:
          GH_TOKEN: ${{ github.token }}
          DATE: ${{ steps.check.outputs.date }}
          BUDGET: ${{ inputs.max_minutes || '330' }}
          OFFSETS: ${{ inputs.offsets || '60,30,15,10,5,3,1' }}
          PROXY_URL: ${{ secrets.PROXY_URL }}
        run: |
          set -uo pipefail
          Y="${DATE:0:4}"
          DB="keiba_${Y}.db"; TAG="data-${Y}"

          gh release view "$TAG" >/dev/null 2>&1 \
            || gh release create "$TAG" --title "Race data $Y" \
                 --notes "JRA レースデータ(自動収集)。keiba_${Y}.db.gz を展開して利用。"
          gh release download "$TAG" --pattern "${DB}.gz" --output "${DB}.gz" 2>/dev/null \
            && gunzip -f "${DB}.gz" || echo "既存 DB なし。新規作成します"

          python -m scraper.poll_odds --db "$DB" --date "$DATE" \
            --offsets "$OFFSETS" --max-minutes "$BUDGET" --sleep 0.5 || echo "poll exit=$?"

          python -c "import sqlite3;c=sqlite3.connect('$DB'); \
            n=c.execute('SELECT COUNT(*) FROM odds_snapshots').fetchone()[0]; \
            print('odds_snapshots total rows:', n); c.close()"

          python -c "import sqlite3; c=sqlite3.connect('$DB'); \
            c.execute('PRAGMA journal_mode=DELETE'); c.execute('VACUUM'); c.close()"
          gzip -9 -c "$DB" > "${DB}.gz"
          gh release upload "$TAG" "${DB}.gz" --clobber
